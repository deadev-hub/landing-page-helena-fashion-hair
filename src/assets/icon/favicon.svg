<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="#823a45"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#fcf3f2" stroke-width="1.5" opacity="0.35"/>

  <!-- Tesoura estilizada -->
  <g fill="none" stroke="#fcf3f2" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lâminas -->
    <path d="M30 32 L48 18"/>
    <path d="M30 32 L48 46"/>

    <!-- Argolas (alças) -->
    <circle cx="19" cy="19" r="5.2"/>
    <circle cx="19" cy="45" r="5.2"/>

    <!-- Hastes conectando argolas ao ponto de articulação -->
    <path d="M23.2 21.8 L30 32"/>
    <path d="M23.2 42.2 L30 32"/>

    <!-- Parafuso central -->
    <circle cx="30" cy="32" r="1.8" fill="#fcf3f2" stroke="none"/>
  </g>

  <!-- Detalhe floral discreto -->
  <g fill="#e7b7a3">
    <circle cx="50" cy="12" r="2.2"/>
    <circle cx="45.5" cy="14" r="1.6"/>
  </g>
</svg>
